<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — RL·Trader</title>
  <meta name="theme-color" content="#07090d" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; }
    .nf-code { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.2em; color: var(--cyan); }
    .nf h1 { font-family: var(--font-display); font-size: clamp(36px, 8vw, 72px); margin: 12px 0; }
    .nf h1 .grad { background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .nf p { color: var(--muted); max-width: 460px; margin: 0 auto 28px; font-size: 17px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <main class="nf">
    <div>
      <div class="nf-code">ERROR 404 · OUT OF SAMPLE</div>
      <h1>This page is <span class="grad">off the chart</span>.</h1>
      <p>The agent has never seen this route — and it doesn't trade on data it hasn't been given. Let's get you back to held-out territory.</p>
      <a class="btn btn-primary" href="/">← Back to RL·Trader</a>
    </div>
  </main>
</body>
</html>
