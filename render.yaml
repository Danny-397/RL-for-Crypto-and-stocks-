# Render Blueprint — one-click deploy of the RL-Trader backend API.
# In the Render dashboard: New + → Blueprint → pick this repo. Render reads
# this file and provisions the service automatically.
services:
  - type: web
    name: rl-trader-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
